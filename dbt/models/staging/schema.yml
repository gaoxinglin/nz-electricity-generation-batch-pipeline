version: 2

models:
  - name: stg_generation
    description: >
      Unpivoted generation data: one row per generator x trading period.
      LATERAL FLATTEN TP1-TP50, NULL filtered, fuel code standardised via
      INNER JOIN on fuel_codes seed, deduplicated by last-write-wins.
    columns:
      - name: generation_id
        description: "Surrogate key: site_code + gen_code + trading_date + trading_period"
        tests:
          - not_null
          - unique
      - name: site_code
        tests:
          - not_null
      - name: gen_code
        tests:
          - not_null
      - name: fuel_type
        tests:
          - not_null
          - accepted_values:
              values: ['Gas', 'Hydro', 'Geothermal', 'Wind', 'Diesel', 'Coal', 'Wood', 'Solar', 'Battery']
      - name: trading_date
        tests:
          - not_null
      - name: trading_period
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 50
      - name: generation_kwh
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000000
              config:
                severity: warn

  - name: stg_generation_null_audit
    description: >
      TP1-TP46 NULLs only (anomalous). TP47-50 NULLs are expected (DST)
      and excluded from this view.

  - name: stg_price
    description: >
      Typed Final Energy Prices. Source = 4 cols; pricing_regime derived
      from trading_date vs var('pricing_regime_cutover'); is_proxy is a
      FALSE placeholder (source flag absent post 2026-05).
    columns:
      - name: price_id
        tests:
          - not_null
          - unique
      - name: poc_code
        tests:
          - not_null
      - name: trading_date
        tests:
          - not_null
      - name: trading_period
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 50
      - name: price_nzd_mwh
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -5000
              max_value: 20000
              config:
                severity: warn
      - name: pricing_regime
        tests:
          - not_null
          - accepted_values:
              values: ['ex_post', 'real_time']
      - name: is_proxy
        tests:
          - not_null

  - name: stg_price_outlier_audit
    description: >
      Positive-spike (> var price_spike_threshold) and negative-price
      (< var negative_price_threshold) rows. Monitoring view only.

  - name: stg_dbt_run
    description: >
      Typed dbt run-result history. Source: raw.raw_dbt_run, populated by
      scripts/ingest_dbt_artifacts.py after every dbt run/test.
    columns:
      - name: invocation_id
        tests:
          - not_null
      - name: node_unique_id
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['pass', 'fail', 'error', 'warn', 'skipped', 'success']

  - name: stg_nsp
    description: >
      Current-row NSP snapshot. Trust source values (no region normalisation).
      Coordinates are NZTM (not lat/lng).
    columns:
      - name: poc_code
        tests:
          - not_null
      - name: nsp_code
        tests:
          - not_null
      - name: island
        tests:
          - accepted_values:
              values: ['NI', 'SI']
              config:
                severity: warn

  - name: stg_hydro_storage
    description: >
      Typed HMD lake storage: one row per site × date (2016+).
      NULLs in active_storage_mm3 and unparseable dates are filtered at staging.
    columns:
      - name: site_code
        tests:
          - not_null
      - name: trading_date
        tests:
          - not_null
      - name: active_storage_mm3
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 10000
              config:
                severity: warn
