version: 2

sources:
  - name: raw
    database: "{{ target.database }}"
    schema: "{{ 'raw' if target.type == 'duckdb' else 'RAW' }}"
    freshness:
      warn_after:
        count: 35
        period: day
      error_after:
        count: 45
        period: day
    loaded_at_field: _source_file_modified_at
    tables:
      - name: raw_generation
        description: >
          Raw EMI generation data loaded via COPY INTO.
          59 columns: 57 CSV columns (all VARCHAR) + trading_month (VARCHAR)
          + _source_file_modified_at (TIMESTAMP_NTZ).
      - name: raw_price
        description: >
          Raw EMI Final Energy Prices.
          Source CSV has 4 columns (observed 2026-05; PRD §2.3's claim of
          7 was incorrect — Island/IsProxyPriceFlag/PublishDateTime do not
          exist in the actual file). raw_price table = 4 source cols
          (all VARCHAR, lowercased) + trading_month + _source_file_modified_at.
