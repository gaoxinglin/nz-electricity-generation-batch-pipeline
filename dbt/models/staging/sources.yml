version: 2

sources:
  - name: raw
    database: "{{ target.database }}"
    schema: "{{ 'raw' if target.type == 'duckdb' else 'RAW' }}"
    freshness:
      warn_after:
        count: 35
        period: day
      error_after:
        count: 45
        period: day
    loaded_at_field: _source_file_modified_at
    tables:
      - name: raw_generation
        description: >
          Raw EMI generation data loaded via COPY INTO.
          59 columns: 57 CSV columns (all VARCHAR) + trading_month (VARCHAR)
          + _source_file_modified_at (TIMESTAMP_NTZ).
      - name: raw_nsp
        description: >
          Raw NSP (Network Supply Points) table snapshot — 27 cols, ~2.5k rows.
          Daily-dated source file; loaded as full snapshot. Coordinates are
          NZTM (NZ Transverse Mercator), not lat/lng — PRD §2.3 imprecise.
      - name: raw_dbt_run
        description: >
          dbt run-result artifacts ingested by scripts/ingest_dbt_artifacts.py
          after each `dbt run`/`dbt test`. One row per node × invocation.
          Used by fct_dbt_run for pipeline observability.
      - name: raw_price
        description: >
          Raw EMI Final Energy Prices.
          Source CSV has 4 columns (observed 2026-05; PRD §2.3's claim of
          7 was incorrect — Island/IsProxyPriceFlag/PublishDateTime do not
          exist in the actual file). raw_price table = 4 source cols
          (all VARCHAR, lowercased) + trading_month + _source_file_modified_at.
