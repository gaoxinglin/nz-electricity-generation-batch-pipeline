version: 2

models:
  - name: dim_plant
    description: >
      Type 1 SCD: one row per (site_code, gen_code).
      fuel_type reflects the latest snapshot only.
    columns:
      - name: plant_id
        description: "Surrogate key: site_code + gen_code"
        tests:
          - not_null
          - unique
      - name: site_code
        tests:
          - not_null
      - name: gen_code
        tests:
          - not_null
          - unique:
              config:
                severity: warn
      - name: fuel_type
        tests:
          - not_null

  - name: fct_generation
    description: >
      One row per generator x trading period. generation_kwh in kWh.
      fuel_type is the transaction-time snapshot from stg_generation.
    columns:
      - name: generation_id
        tests:
          - not_null
          - unique
      - name: plant_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_plant')
              field: plant_id
      - name: trading_date
        tests:
          - not_null
      - name: generation_kwh
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000000
              config:
                severity: warn

  - name: mart_generation_daily
    description: "Daily generation by fuel type. GWh for dashboard readability."
    columns:
      - name: trading_date
        tests:
          - not_null
      - name: fuel_type
        tests:
          - not_null
      - name: total_generation_kwh
        tests:
          - not_null
      - name: total_generation_gwh
        tests:
          - not_null

  - name: mart_generation_monthly
    description: "Monthly generation by fuel type."
    columns:
      - name: year_month
        tests:
          - not_null
      - name: fuel_type
        tests:
          - not_null
      - name: total_generation_kwh
        tests:
          - not_null
      - name: active_days
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 31

  - name: mart_renewable_ratio
    description: >
      Monthly renewable energy ratio. Renewable = Hydro + Geothermal +
      Wind + Solar + Wood. Battery excluded (storage, not generation).
    columns:
      - name: year_month
        tests:
          - not_null
          - unique
      - name: renewable_pct
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

  - name: mart_plant_ranking
    description: "Monthly plant ranking by total generation."
    columns:
      - name: year_month
        tests:
          - not_null
      - name: site_code
        tests:
          - not_null
      - name: monthly_rank
        tests:
          - not_null

  - name: fct_price
    description: >
      One row per (poc_code, trading_date, tp_number). price_nzd_mwh in $/MWh.
      Incremental delete+insert with `lookback_days` re-process window so
      interim → final corrections overwrite cleanly.
    columns:
      - name: date_key
        description: "INT YYYYMMDD; future dim_date join key."
        tests:
          - not_null
      - name: trading_date
        tests:
          - not_null
      - name: poc_code
        tests:
          - not_null
      - name: tp_number
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 50
      - name: price_nzd_mwh
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -5000
              max_value: 20000
              config:
                severity: warn
      - name: pricing_regime
        tests:
          - accepted_values:
              values: ['ex_post', 'real_time']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - poc_code
            - trading_date
            - tp_number

  - name: fct_market_volume
    description: >
      Reconciled market volumes aggregated to POC x trading date x trading
      period. Injection and offtake are separate measures.
    columns:
      - name: poc_code
        tests:
          - not_null
      - name: trading_date
        tests:
          - not_null
      - name: tp_number
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 50
      - name: injection_kwh
        tests:
          - not_null
      - name: offtake_kwh
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - poc_code
            - trading_date
            - tp_number

  - name: int_price_daily
    description: >
      Grain poc_code × trading_date × tp_number, with daily POC-level mean
      (avg_price_all and avg_price_non_proxy) as window aggregates on each
      TP row. Designed to join cleanly with int_generation_by_poc in Phase 2.
    columns:
      - name: poc_code
        tests:
          - not_null
      - name: trading_date
        tests:
          - not_null
      - name: tp_number
        tests:
          - not_null
      - name: avg_price_all
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - poc_code
            - trading_date
            - tp_number

  - name: dim_node
    description: >
      POC-grain dimension from NSP. Type 1; latest current row per POC.
    columns:
      - name: node_id
        tests:
          - not_null
          - unique
      - name: poc_code
        tests:
          - not_null
          - unique
      - name: island
        tests:
          - accepted_values:
              values: ['NI', 'SI']
              config:
                severity: warn

  - name: dim_date
    description: >
      Day grain 2016-01-01 .. 2030-12-31. NIWA seasons, NZ public holidays.
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
      - name: trading_date
        tests:
          - not_null
          - unique
      - name: season
        tests:
          - not_null
          - accepted_values:
              values: ['Summer', 'Autumn', 'Winter', 'Spring']

  - name: dim_fuel
    description: "Canonical fuel-type dimension (BOOL_OR of is_renewable across raw aliases)."
    columns:
      - name: fuel_id
        tests:
          - not_null
          - unique
      - name: fuel_type
        tests:
          - not_null
          - unique

  - name: int_generation_by_poc
    description: "Generation aggregated to POC × date × tp × fuel grain."
    columns:
      - name: poc_code
        tests:
          - not_null
      - name: trading_date
        tests:
          - not_null
      - name: tp_number
        tests:
          - not_null
      - name: fuel_type
        tests:
          - not_null
      - name: generation_kwh
        tests:
          - not_null

  - name: mart_price_daily
    description: "Daily POC price summary, joined to dim_node for island/region."
    columns:
      - name: trading_date
        tests:
          - not_null
      - name: poc_code
        tests:
          - not_null
      - name: avg_price_all
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - poc_code
            - trading_date

  - name: mart_price_spike_events
    description: "Price spike events (> threshold) with co-located fuel mix."
    columns:
      - name: trading_date
        tests:
          - not_null
      - name: poc_code
        tests:
          - not_null
      - name: tp_number
        tests:
          - not_null
      - name: price_nzd_mwh
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 300
              max_value: 20000

  - name: mart_price_anomaly_events
    description: >
      Price anomalies enriched with rolling price context and reconciled
      injection/offtake volumes. Includes threshold spikes, negative prices,
      and statistical outliers.
    columns:
      - name: trading_date
        tests:
          - not_null
      - name: poc_code
        tests:
          - not_null
      - name: tp_number
        tests:
          - not_null
      - name: anomaly_type
        tests:
          - not_null
          - accepted_values:
              values: ['positive_spike', 'negative_price', 'statistical_outlier']
      - name: price_nzd_mwh
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - poc_code
            - trading_date
            - tp_number
            - anomaly_type

  - name: mart_price_spike_features
    description: >
      Feature table for price spike prediction experiments. Target column is
      is_price_spike.
    columns:
      - name: poc_code
        tests:
          - not_null
      - name: trading_date
        tests:
          - not_null
      - name: tp_number
        tests:
          - not_null
      - name: price_nzd_mwh
        tests:
          - not_null
      - name: is_price_spike
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - poc_code
            - trading_date
            - tp_number

  - name: mart_renewable_price_impact
    description: "Per (POC × date × tp): renewable share vs wholesale price."
    columns:
      - name: poc_code
        tests:
          - not_null
      - name: trading_date
        tests:
          - not_null
      - name: tp_number
        tests:
          - not_null
      - name: price_nzd_mwh
        tests:
          - not_null
      - name: renewable_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

  - name: fct_dbt_run
    description: >
      One row per (invocation_id, node_unique_id). Powers Pipeline Health
      observability dashboard.
    columns:
      - name: invocation_id
        tests:
          - not_null
      - name: node_unique_id
        tests:
          - not_null
      - name: node_type
        tests:
          - accepted_values:
              values: ['model', 'test', 'seed', 'snapshot', 'operation', 'source']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - invocation_id
            - node_unique_id

  - name: mart_warehouse_cost
    description: >
      Daily warehouse cost from Snowflake ACCOUNT_USAGE (SF target only).
      Disabled on DuckDB.
    config:
      enabled: "{{ target.type == 'snowflake' }}"
    columns:
      - name: usage_date
        tests:
          - not_null
      - name: warehouse_name
        tests:
          - not_null

  - name: mart_seasonal_pattern
    description: >
      Seasonal generation pattern. NZ seasons: Summer Dec-Feb,
      Autumn Mar-May, Winter Jun-Aug, Spring Sep-Nov.
      December belongs to next year's season_year.
    columns:
      - name: season_year
        tests:
          - not_null
      - name: season
        tests:
          - not_null
          - accepted_values:
              values: ['Summer', 'Autumn', 'Winter', 'Spring']
      - name: fuel_type
        tests:
          - not_null

  - name: dim_catchment
    description: >
      Hydro catchment dimension. One row per major NZ hydro storage lake.
      Sourced from hydro_catchment_mapping seed (10 lakes, 2 islands).
    columns:
      - name: catchment_key
        tests:
          - not_null
          - unique
      - name: site_code
        tests:
          - not_null
          - unique
      - name: island
        tests:
          - accepted_values:
              values: ['NI', 'SI']

  - name: fct_hydro
    description: >
      Daily hydro lake storage fact. Grain: site_code × trading_date (2016+).
      active_storage_mm3 in million cubic metres (Mm³).
      Materialised as full-refresh table (HMD is a periodic snapshot).
    columns:
      - name: hydro_id
        tests:
          - not_null
          - unique
      - name: trading_date
        tests:
          - not_null
      - name: site_code
        tests:
          - not_null
      - name: active_storage_mm3
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 10000
              config:
                severity: warn
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - site_code
            - trading_date

  - name: mart_hydro_price_driver
    description: >
      Monthly hydro storage vs wholesale price per island. Grain: island × year_month.
      avg_total_storage_mm3 = island sum of all lakes, monthly average.
      storage_pct_of_max = % of the island's all-time max observed storage.
      Price columns are NULL for months outside the loaded price range.
    columns:
      - name: island
        tests:
          - not_null
      - name: year_month
        tests:
          - not_null
      - name: avg_total_storage_mm3
        tests:
          - not_null
      - name: storage_pct_of_max
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              config:
                severity: warn
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - island
            - year_month
