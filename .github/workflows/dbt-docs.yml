name: dbt Docs

on:
  push:
    branches: [main]
    paths:
      - "dbt/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: /tmp/dbt_ci

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-core dbt-snowflake
      - name: Create CI profiles.yml
        run: |
          mkdir -p $DBT_PROFILES_DIR
          cat > $DBT_PROFILES_DIR/profiles.yml <<'EOF'
          nz_electricity:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: dummy
                user: dummy
                password: dummy
                role: dummy
                warehouse: dummy
                database: dummy
                schema: RAW
                threads: 1
          EOF
      - name: Install dbt packages
        run: cd dbt && dbt deps
      - name: Generate docs
        run: |
          cd dbt
          dbt parse
          python3 - <<'PYEOF'
import dbt.include.global_project as pkg
import json, os, shutil
from datetime import datetime

os.makedirs("target", exist_ok=True)

# Copy static dbt-docs frontend (index.html etc.) bundled with the package
docs_dir = os.path.join(os.path.dirname(pkg.__file__), "docs")
if os.path.isdir(docs_dir):
    for name in os.listdir(docs_dir):
        src = os.path.join(docs_dir, name)
        if os.path.isfile(src):
            shutil.copy(src, os.path.join("target", name))

# Write an empty catalog so the docs site loads without DB access
catalog = {
    "metadata": {
        "generated_at": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
        "dbt_schema_version": "https://schemas.getdbt.com/dbt/catalog/v1.json",
    },
    "nodes": {},
    "sources": {},
    "errors": None,
}
with open("target/catalog.json", "w") as f:
    json.dump(catalog, f)
PYEOF
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp dbt/target/index.html _site/
          cp dbt/target/manifest.json _site/
          cp dbt/target/catalog.json _site/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
